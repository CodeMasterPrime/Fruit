<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>History</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>📜 Scan History</h2>

<table border="1" width="80%" align="center">
<tr>
  <th>Fruit</th>
  <th>Date</th>
</tr>

<tbody id="table"></tbody>
</table>

<script>
let data = JSON.parse(localStorage.getItem("history") || "[]");

let html = "";
data.forEach(d => {
  html += `<tr>
    <td>${d.name}</td>
    <td>${d.date}</td>
  </tr>`;
});

document.getElementById("table").innerHTML = html;
</script>

</body>
</html>
