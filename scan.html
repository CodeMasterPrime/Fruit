<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan Fruit</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image"></script>
</head>

<body style="text-align:center">

<h2>🍎 Fruit Scan</h2>

<video id="webcam" autoplay playsinline width="300"></video>
<h3 id="result">กำลังโหลด...</h3>

<script>
const URL = "./";

let model, webcam;

async function init() {
  // โหลดโมเดล
  model = await tmImage.load(URL + "model.json", URL + "metadata.json");

  // เปิดกล้อง
  webcam = new tmImage.Webcam(300, 300, true);
  await webcam.setup();   // ขอ permission
  await webcam.play();

  // ใส่ stream ลง video
  document.getElementById("webcam").srcObject = webcam.webcam.stream;

  loop();
}

async function loop() {
  webcam.update();
  await predict();
  requestAnimationFrame(loop);
}

async function predict() {
  const prediction = await model.predict(webcam.canvas);

  let best = prediction[0];
  for (let p of prediction) {
    if (p.probability > best.probability) best = p;
  }

  document.getElementById("result").innerText =
    best.className + " " + (best.probability * 100).toFixed(1) + "%";
}

init();
</script>

</body>
</html>
